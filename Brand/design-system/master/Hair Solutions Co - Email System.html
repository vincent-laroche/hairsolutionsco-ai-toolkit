<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Hair Solutions Co. — Email Design System</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="styles/tokens.css" />
  <style>
    html, body { margin: 0; padding: 0; }
    body { background: var(--bg); }
    code { font-family: 'Geist Mono', ui-monospace, monospace; font-size: 0.9em; background: oklch(0.94 0.002 250); padding: 1px 6px; border-radius: 4px; }
    .pill { display: inline-block; font-size: 10px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; padding: 4px 8px; border-radius: 999px; }
    .pill-keep { background: oklch(0.92 0.05 155); color: oklch(0.32 0.13 155); }
    .pill-merge { background: oklch(0.93 0.05 80); color: oklch(0.42 0.16 80); }
    .pill-delete { background: oklch(0.94 0.06 25); color: oklch(0.45 0.18 25); }
    .row-grid { display: grid; grid-template-columns: 200px 1fr 110px 1.4fr 1fr; gap: 12px; padding: 14px 16px; align-items: start; font-size: 13px; line-height: 1.5; border-top: 1px solid var(--border); }
    .row-grid:first-child { border-top: 0; }
    .row-grid .col-name { font-family: var(--f-mono); font-size: 12px; font-weight: 600; }
    .row-grid .col-v2 { font-family: var(--f-mono); font-size: 11px; color: var(--ink-muted); }
    .row-grid .col-action { color: var(--ink-soft); }
    .row-head { font-size: 10px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-muted); padding: 12px 16px; border-bottom: 1px solid var(--border-strong); display: grid; grid-template-columns: 200px 1fr 110px 1.4fr 1fr; gap: 12px; }
    .group-head { font-size: 11px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink); padding: 18px 16px 8px; }
    .phase-card { padding: 24px 28px; border: 1px solid var(--border); border-radius: 14px; background: var(--paper); margin-bottom: 14px; }
    .phase-card .phase-num { font-family: var(--f-mono); font-size: 11px; font-weight: 700; color: var(--ink-muted); letter-spacing: 0.06em; }
    .phase-card .phase-title { font-size: 24px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.1; margin: 4px 0 4px; }
    .phase-card .phase-rule { font-size: 12px; color: var(--ink-muted); font-style: italic; margin-bottom: 14px; }
    .phase-card ol { margin: 0; padding-left: 18px; font-size: 14px; line-height: 1.6; color: var(--ink-soft); }
    .phase-card ol li + li { margin-top: 6px; }
    .phase-meta { display: flex; justify-content: space-between; align-items: baseline; }
    .phase-eta { font-family: var(--f-mono); font-size: 11px; color: var(--ink-muted); }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body class="hsc-surface dir-refined">
  <div id="root"></div>
  <script type="text/babel" src="components/Primitives.jsx"></script>
  <script type="text/babel" src="components/EmailBlocks.jsx"></script>
  <script type="text/babel" src="components/SystemPageShell.jsx"></script>
  <script type="text/babel" src="components/MigrationData.jsx"></script>
  <script type="text/babel" data-presets="env,react">
    const groupBy = (arr, key) => arr.reduce((acc, x) => ((acc[x[key]] ||= []).push(x), acc), {});

    const StatusPill = ({ status }) => (
      <span className={"pill pill-" + status}>{status === "keep" ? "Keep" : status === "merge" ? "Merge / rename" : "Delete"}</span>
    );

    const InventoryTable = () => {
      const groups = groupBy(INVENTORY, "group");
      return (
        <div className="hsc-card" style={{ padding: 0 }}>
          <div className="row-head">
            <div>Module</div>
            <div>Role</div>
            <div>Action</div>
            <div>Migration step</div>
            <div>v2 path</div>
          </div>
          {Object.entries(groups).map(([g, rows]) => (
            <div key={g}>
              <div className="group-head">{g}</div>
              {rows.map(r => (
                <div className="row-grid" key={r.name}>
                  <div className="col-name">{r.name}</div>
                  <div>{r.role}</div>
                  <div><StatusPill status={r.status} /></div>
                  <div className="col-action">{r.action}</div>
                  <div className="col-v2">{r.v2name}</div>
                </div>
              ))}
            </div>
          ))}
        </div>
      );
    };

    const PhaseCard = ({ p }) => (
      <div className="phase-card">
        <div className="phase-meta">
          <div className="phase-num">{p.phase}</div>
          <div className="phase-eta">~ {p.eta}</div>
        </div>
        <div className="phase-title">{p.title}</div>
        <div className="phase-rule">— {p.rule}</div>
        <ol>{p.steps.map((s, i) => <li key={i}>{s}</li>)}</ol>
      </div>
    );

    function App() {
      return (
        <div>
          <SystemHeader title="Email Design System" subtitle="Tokens, blocks, layout sections, templates, and the migration plan from v1 to v2." current="Email" />

          <Section eyebrow="01 · Foundation" title="Email canvas + cadence"
            intro="Email is its own product surface — narrower than web, table-based for compatibility. Same DNA as web: warm sand canvas, paper cards, ink type, sparing obsidian breaker.">
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 24 }}>
              <div className="hsc-card" style={{ padding: 24 }}>
                <SubHead>Canvas + width</SubHead>
                <RuleList items={[
                  <><b>Container width:</b> <code>640px</code> max. Body content area <code>560px</code> after 40px gutters.</>,
                  <><b>Page background:</b> <code>#f4f3ef</code> (sand). Cards sit on this in <code>#fdfdfb</code> (paper).</>,
                  <><b>Mobile:</b> single column, gutter 24px, font scales -10%.</>,
                  <><b>Min body font:</b> 15px (16 preferred). Line-height 1.55.</>,
                  <><b>CTA hit area:</b> minimum 44×44px, padding 14×24, font 13/700.</>,
                  <><b>Image radius:</b> 12px (most images), 14px (full-bleed cards).</>,
                ]} />
              </div>
              <div className="hsc-card" style={{ padding: 24 }}>
                <SubHead>Cadence rules per email</SubHead>
                <RuleList items={[
                  <><b>One headline only.</b> The hero owns it. Subsequent sections use h3 (20px).</>,
                  <><b>Max one obsidian breaker</b> per email. Always followed by paper.</>,
                  <><b>Max one primary CTA</b> above the fold. Secondary actions become ghost links.</>,
                  <><b>Max one product grid</b> per email. If you need two, it's two emails.</>,
                  <><b>Footer is always paper</b>, never obsidian — keeps unsub legible.</>,
                  <><b>Pre-header text:</b> 80–110 chars. Never duplicate the subject line.</>,
                ]} />
              </div>
            </div>
          </Section>

          <Section eyebrow="02 · Type scale" title="Email-specific type"
            intro="Smaller scale than web — Apple Mail and Outlook reflow aggressively, so we keep size differentials tight.">
            <div className="hsc-card" style={{ padding: 0, overflow: "hidden" }}>
              <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
                <thead>
                  <tr style={{ background: "var(--bg-deep)", textAlign: "left" }}>
                    {["Role", "Size / line", "Weight / tracking", "Use", "Color"].map(h => (
                      <th key={h} style={{ padding: "12px 16px", fontSize: 10, fontWeight: 700, letterSpacing: "0.16em", textTransform: "uppercase", color: "var(--ink-muted)" }}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {[
                    ["Hero display", "44 / 1.05", "700 · -0.025em", "1× per email · hero only", "var(--ink)"],
                    ["H2", "30 / 1.1", "700 · -0.02em", "Section starters · max 2", "var(--ink)"],
                    ["H3", "20 / 1.3", "600 · -0.01em", "Card headings, list items", "var(--ink)"],
                    ["Body", "15 / 1.55", "400", "Paragraph copy", "var(--ink)"],
                    ["Body soft", "15 / 1.55", "400", "Secondary copy, intros", "var(--ink-soft)"],
                    ["Small", "13 / 1.5", "400", "Captions, meta", "var(--ink-muted)"],
                    ["Eyebrow", "10 / 1", "700 · 0.18em UC", "Labels above titles", "var(--ink-muted)"],
                    ["CTA", "13 / 1.5", "700 · 0.02em UC", "Buttons", "var(--paper) on ink"],
                  ].map(r => (
                    <tr key={r[0]} style={{ borderTop: "1px solid var(--border)" }}>
                      {r.map((c, i) => <td key={i} style={{ padding: "12px 16px", fontFamily: i === 1 || i === 2 ? "var(--f-mono)" : "var(--f-sans)", fontSize: 12, color: i === 4 ? "var(--ink-muted)" : "var(--ink)" }}>{c}</td>)}
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </Section>

          <Section eyebrow="03 · Color tokens" title="Hex equivalents"
            intro="HubSpot and email clients require literal hex. These map 1:1 to the OKLCH design tokens.">
            <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 12 }}>
              {[
                ["Sand · canvas", "#f4f3ef", "var(--bg)"],
                ["Paper · card", "#fdfdfb", "var(--paper)"],
                ["Ink · text", "#1a1a18", "var(--ink)"],
                ["Ink soft", "#3b3a36", "var(--ink-soft)"],
                ["Ink muted", "#6f6c66", "var(--ink-muted)"],
                ["Stone · divider", "#dad7d0", "var(--stone)"],
                ["Obsidian · dark bg", "#1f1d1a", "var(--obsidian)"],
                ["Clay · accent", "#b78657", "var(--clay)"],
              ].map(([n, hex, tok]) => (
                <div key={n} style={{ border: "1px solid var(--border)", borderRadius: 12, overflow: "hidden", background: "var(--paper)" }}>
                  <div style={{ background: hex, height: 80, borderBottom: "1px solid var(--border)" }} />
                  <div style={{ padding: 12 }}>
                    <div style={{ fontSize: 13, fontWeight: 600 }}>{n}</div>
                    <div style={{ fontFamily: "var(--f-mono)", fontSize: 11, color: "var(--ink-muted)" }}>{hex}</div>
                    <div style={{ fontFamily: "var(--f-mono)", fontSize: 10, color: "var(--ink-muted)" }}>{tok}</div>
                  </div>
                </div>
              ))}
            </div>
          </Section>

          <Section eyebrow="04 · Layout grammar" title="The seven section archetypes"
            intro="Every email is a stack of these. New campaigns must use one of them. If you can't, it's a brief, not a one-off.">
            <div style={{ display: "grid", gridTemplateColumns: "repeat(2, 1fr)", gap: 14 }}>
              {[
                ["Header", "blocks/hsc_email_header", "Centered logo (180px). Optional 3-link nav row."],
                ["Hero", "sections/hero/sec_hero_image", "Full-bleed hero image; optional eyebrow + h1 overlay."],
                ["Intro paragraph", "sections/text/sec_intro_richtext", "1–3 sentence richtext, 64ch max."],
                ["Insight card", "blocks/hsc_customer_snapshot · context=*", "Personalized snapshot or pre-rendered milestone."],
                ["Split / story", "sections/split/sec_split_copy_image", "50/50 copy + media; media_side controls direction."],
                ["Product grid", "sections/grid/sec_product_grid", "2×2 product cards. Image, title, blurb, link."],
                ["Dark breaker", "blocks/hsc_dark_breaker (new)", "Full-bleed obsidian section: eyebrow + h2 + dual CTA."],
                ["Footer", "blocks/hsc_email_footer", "Brand-mark, address, social, unsub, privacy."],
              ].map(([n, id, d]) => (
                <div key={n} className="hsc-card" style={{ padding: 18 }}>
                  <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.16em", textTransform: "uppercase", color: "var(--ink-muted)", marginBottom: 6 }}>{n}</div>
                  <div style={{ fontFamily: "var(--f-mono)", fontSize: 11, marginBottom: 8 }}>{id}</div>
                  <p style={{ margin: 0, fontSize: 13, color: "var(--ink-soft)", lineHeight: 1.5 }}>{d}</p>
                </div>
              ))}
            </div>
          </Section>

          <Section eyebrow="05 · Email recipes" title="Three canonical emails"
            intro="Every campaign should map to one of these three patterns. Promotional, transactional, or recap.">
            <div className="hsc-card" style={{ padding: 0, overflow: "hidden" }}>
              <table style={{ width: "100%", borderCollapse: "collapse" }}>
                <thead>
                  <tr style={{ background: "var(--bg-deep)" }}>
                    {["Recipe", "Section sequence", "Example campaigns"].map(h => (
                      <th key={h} style={{ padding: "14px 16px", textAlign: "left", fontSize: 10, fontWeight: 700, letterSpacing: "0.16em", textTransform: "uppercase", color: "var(--ink-muted)" }}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {[
                    ["Promotional", "header · hero · intro · split · product-grid · testimonial · dark-breaker · footer", "J3 New drop · J6 Plan promo · J9 Seasonal collection"],
                    ["Transactional", "header · hero (status) · intro · order-summary · split (next steps) · footer", "Order confirmed · Shipped · Delivered · Plan renewed"],
                    ["Recap / loyalty", "header · hero · customer-snapshot · split · base-type-guidance · testimonial · dark-breaker · footer", "J5 Annual recap · J8 30-day renewal · Birthday"],
                  ].map(r => (
                    <tr key={r[0]} style={{ borderTop: "1px solid var(--border)" }}>
                      <td style={{ padding: "14px 16px", fontWeight: 600, fontSize: 14, width: 140 }}>{r[0]}</td>
                      <td style={{ padding: "14px 16px", fontFamily: "var(--f-mono)", fontSize: 11, color: "var(--ink-soft)", lineHeight: 1.7 }}>{r[1]}</td>
                      <td style={{ padding: "14px 16px", fontSize: 12, color: "var(--ink-muted)" }}>{r[2]}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </Section>

          <Section eyebrow="06 · Voice + copy" title="How emails should read">
            <div className="hsc-card" style={{ padding: 24 }}>
              <RuleList items={[
                <><b>Subject lines:</b> 35–55 chars. Sentence case. No emoji. State the value, not the marketing angle.</>,
                <><b>Pre-header:</b> 80–110 chars. Continues the subject — does not repeat it.</>,
                <><b>Greeting:</b> First name only. No "Hi there". Personalize or skip.</>,
                <><b>Body voice:</b> A master tailor talking. Confident, technical, never cute. Numbers are precise.</>,
                <><b>CTA copy:</b> Action verb + object. "Open my recap", "Track my order", "Shop the drop". Never "Click here", never "Learn more".</>,
                <><b>Sign-off:</b> "— Hair Solutions Co." or first-name human signature on personal-tone emails. Never both.</>,
              ]} />
            </div>
          </Section>

          <Section eyebrow="07 · Module inventory" title="Every block + section"
            intro="The full v1 inventory across pipeline/blocks and pipeline/sections, with the v2 disposition for each. Green = keep, amber = merge or rename, red = delete.">
            <InventoryTable />
          </Section>

          <Section eyebrow="08 · Migration plan" title="Eight phases, ~7 working days"
            intro="Sequential. Each phase ends with a tag in HubSpot Design Manager so we can roll back. Phase 5 is the heaviest — that's where templates get manually verified.">
            <div>{PHASES.map((p, i) => <PhaseCard key={i} p={p} />)}</div>
          </Section>

          <Section eyebrow="09 · QA checklist" title="Before any email ships">
            <div className="hsc-card" style={{ padding: 24 }}>
              <RuleList items={[
                <>Subject + pre-header reviewed. Sender name = "Hair Solutions Co."</>,
                <>Renders cleanly in Gmail web, Apple Mail, Outlook 365 web + Win desktop.</>,
                <>Dark-mode safe — sand canvas holds, no white-on-white inversions.</>,
                <>All images have alt text. Hero alt describes the message, not the picture.</>,
                <>Every CTA links to an https URL with UTM tags <code>utm_source=email · utm_medium=campaign · utm_campaign=&lt;slug&gt;</code>.</>,
                <>Plain-text alternative is readable end-to-end.</>,
                <>Unsubscribe + privacy links present in footer.</>,
                <>One primary CTA, max one obsidian breaker, max one product grid.</>,
                <>Total weight under 100KB excluding images.</>,
              ]} />
            </div>
          </Section>

          <footer style={{ padding: "32px 48px", textAlign: "center", fontSize: 11, color: "var(--ink-muted)", letterSpacing: "0.04em" }}>v2.0 · Last updated 2026-04-29 · Owned by Hair Solutions Co. Brand</footer>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
