<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Hair Solutions Co. — Web Design System</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="styles/tokens.css" />
  <style>
    html, body { margin: 0; padding: 0; }
    body { background: var(--bg); }
    code { font-family: 'Geist Mono', ui-monospace, monospace; font-size: 0.9em; background: oklch(0.94 0.002 250); padding: 1px 6px; border-radius: 4px; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body class="hsc-surface dir-refined">
  <div id="root"></div>
  <script type="text/babel" src="components/Primitives.jsx"></script>
  <script type="text/babel" src="components/SystemPageShell.jsx"></script>
  <script type="text/babel" src="components/WebAndSocial.jsx"></script>
  <script type="text/babel" data-presets="env,react">
    function App() {
      return (
        <div>
          <SystemHeader title="Web Design System" subtitle="Layout, components, sections, breakpoints. For hairsolutions.co + product pages." current="Web" />

          <Section eyebrow="01 · Layout" title="The page grid"
            intro="12-column grid, 1240px max content width, 32px gutter. Body off-white. Sections breathe with 80–120px vertical padding on desktop, 48px on mobile.">
              <div className="hsc-card" style={{ padding: 24 }}>
                <RuleList items={[
                  <><b>Container max:</b> 1240px (content) · 1440px (full-bleed media).</>,
                  <><b>Gutter:</b> 32px desktop · 20px tablet · 16px mobile.</>,
                  <><b>Section padding:</b> 96/120px desktop top+bottom · 48/56 mobile.</>,
                  <><b>Breakpoints:</b> sm 640 · md 768 · lg 1024 · xl 1280 · 2xl 1440.</>,
                  <><b>Card radius:</b> 14px. Image radius 14px. Button radius 10px.</>,
                  <><b>Hairlines:</b> 1px ink/10% on light, 1px white/10% on obsidian.</>,
                ]} />
              </div>
          </Section>

          <Section eyebrow="02 · Live preview" title="Homepage above-the-fold">
            <WebFrame direction="refined">
              <WebNav />
              <WebHero direction="refined" />
              <WebProductRow />
              <WebDarkSection direction="refined" />
            </WebFrame>
          </Section>

          <Section eyebrow="03 · Component map" title="The web kit"
            intro="What sits where. Each maps to a Storefront/Shopify section. Naming: web/{group}/{name}.">
            <div style={{ display: "grid", gridTemplateColumns: "repeat(2, 1fr)", gap: 16 }}>
              {[
                ["web/nav/header", "Sticky 80px nav. Logo left, menu center, CTA + locale right."],
                ["web/hero/copy-image", "50/50 hero. Eyebrow + H1 + body + dual CTA. Floating product card right."],
                ["web/hero/full-bleed", "Editorial hero. 21:9 image with overlay headline."],
                ["web/section/dark-breaker", "Obsidian section, centered headline + dual CTA. Use 1×/page max."],
                ["web/section/product-row-4", "4-up product cards. Image 1:1, title, blurb, ghost link."],
                ["web/section/feature-split", "60/40 image + copy. media_side select."],
                ["web/section/process-steps", "3 or 4 numbered steps with icons + microcopy."],
                ["web/section/quote-block", "Single testimonial with portrait left, quote right."],
                ["web/section/story-pair", "2 editorial story cards (image + headline + read more)."],
                ["web/section/faq-list", "Accordion list, hairline divider, ink chevron."],
                ["web/section/cta-banner", "Single sentence + primary CTA. Light or obsidian."],
                ["web/footer/sitemap", "Three column sitemap + newsletter + legal row."],
              ].map(([id, desc]) => (
                <div key={id} className="hsc-card" style={{ padding: 18 }}>
                  <div style={{ fontFamily: "var(--f-mono)", fontSize: 12, fontWeight: 600 }}>{id}</div>
                  <p style={{ margin: "6px 0 0", fontSize: 13, color: "var(--ink-soft)" }}>{desc}</p>
                </div>
              ))}
            </div>
          </Section>

          <Section eyebrow="04 · Buttons + forms" title="Interactive">
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 24 }}>
              <div className="hsc-card" style={{ padding: 24 }}>
                <SubHead>Buttons</SubHead>
                <div style={{ display: "flex", gap: 10, flexWrap: "wrap", marginBottom: 16 }}>
                  <Btn variant="primary">Primary</Btn>
                  <Btn variant="secondary">Secondary</Btn>
                  <Btn variant="ghost">Ghost</Btn>
                </div>
                <RuleList items={[
                  <>Hover: primary darkens to <code>oklch(0.25 0.006 60)</code>, secondary inverts.</>,
                  <>Focus: 2px ink ring offset 2px (visible on both light + dark).</>,
                  <>Disabled: 40% opacity, no hover.</>,
                ]} />
              </div>
              <div className="hsc-card" style={{ padding: 24 }}>
                <SubHead>Form fields</SubHead>
                <div style={{ display: "grid", gap: 10 }}>
                  <input placeholder="Email" style={{ padding: "14px 16px", border: "1px solid var(--border-strong)", borderRadius: 10, fontFamily: "var(--f-sans)", fontSize: 14, background: "var(--paper)" }} />
                  <select style={{ padding: "14px 16px", border: "1px solid var(--border-strong)", borderRadius: 10, fontFamily: "var(--f-sans)", fontSize: 14, background: "var(--paper)" }}>
                    <option>French Lace</option><option>Skin / Poly</option><option>Mono Top</option>
                  </select>
                  <Btn variant="primary">Subscribe</Btn>
                </div>
                <RuleList items={[
                  <>Field height 48px. Padding 14×16. Radius 10px.</>,
                  <>Label above field, 11/700/0.06em uppercase ink-muted.</>,
                  <>Error state: 1px error border + 13px error message below.</>,
                ]} />
              </div>
            </div>
          </Section>

          <Section eyebrow="05 · Page templates" title="What pages map where"
            intro="Each Shopify template uses a fixed sequence of sections. Don't deviate without a brief.">
            <div style={{ display: "grid", gridTemplateColumns: "repeat(2, 1fr)", gap: 16 }}>
              {[
                ["Homepage", "nav · hero/copy-image · product-row-4 · feature-split · dark-breaker · story-pair · cta-banner · footer"],
                ["Collection", "nav · hero/full-bleed · filter bar · product grid · cta-banner · footer"],
                ["Product (PDP)", "nav · gallery + buy-box · spec table · process-steps · quote-block · cross-sell · footer"],
                ["About / process", "nav · hero/full-bleed · process-steps · feature-split · quote-block · dark-breaker · footer"],
                ["Journal index", "nav · hero/full-bleed (editorial) · article grid · cta-banner · footer"],
                ["Article", "nav · hero (image + meta) · richtext column · pull-quote · related articles · footer"],
              ].map(([t, seq]) => (
                <div key={t} className="hsc-card" style={{ padding: 18 }}>
                  <SubHead>{t}</SubHead>
                  <p style={{ margin: 0, fontFamily: "var(--f-mono)", fontSize: 11, color: "var(--ink-soft)", lineHeight: 1.6 }}>{seq}</p>
                </div>
              ))}
            </div>
          </Section>

          <Section eyebrow="06 · Imagery + motion" title="The visual rules">
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 24 }}>
              <div className="hsc-card" style={{ padding: 24 }}>
                <SubHead>Imagery</SubHead>
                <RuleList items={[
                  <>Hero portraits: 4:5 or 21:9 full-bleed. Always with a subject silhouette, never product floats only.</>,
                  <>Product: 1:1 on obsidian or paper backdrop. No drop shadows, no clip-paths.</>,
                  <>Editorial: black-and-white permitted on hero only. Color on product.</>,
                  <>Never use stock — every photo is shot to spec.</>,
                ]} />
              </div>
              <div className="hsc-card" style={{ padding: 24 }}>
                <SubHead>Motion</SubHead>
                <RuleList items={[
                  <>Page transitions: opacity 0→1 over 240ms ease-out.</>,
                  <>Hover lift on product cards: translateY(-2px) over 180ms.</>,
                  <>Ghost button arrow grows 18→28px on hover, 160ms ease.</>,
                  <>Respect <code>prefers-reduced-motion</code> — disable all transforms.</>,
                ]} />
              </div>
            </div>
          </Section>

          <Section eyebrow="07 · Accessibility" title="Baseline">
            <div className="hsc-card" style={{ padding: 24 }}>
              <RuleList items={[
                <>Body 16px minimum on web (vs 15 in email). Line-length 64ch max.</>,
                <>Color contrast WCAG AA on all text. Ink on Body off-white passes 14:1.</>,
                <>Focus ring always visible. Never <code>outline: none</code> without replacement.</>,
                <>Every image has alt. Decorative images use <code>alt=""</code>.</>,
                <>Forms: visible label, no placeholder-only inputs.</>,
                <>Skip-link to <code>#main</code> as the first focusable element.</>,
              ]} />
            </div>
          </Section>

          <footer style={{ padding: "32px 48px", textAlign: "center", fontSize: 11, color: "var(--ink-muted)", letterSpacing: "0.04em" }}>v2.0 · Last updated 2026-04-29 · Owned by Hair Solutions Co. Brand</footer>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
