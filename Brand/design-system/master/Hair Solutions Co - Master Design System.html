<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Hair Solutions Co. — Master Design System</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="styles/tokens.css" />
  <style>
    html, body { margin: 0; padding: 0; background: oklch(0.14 0.004 60); }
    body { font-family: 'Geist', system-ui, sans-serif; color: oklch(0.95 0.025 85); }
    code {
      font-family: 'Geist Mono', ui-monospace, monospace;
      font-size: 0.92em;
      background: oklch(0.93 0.002 250);
      color: oklch(0.17 0.006 60);
      padding: 1px 6px;
      border-radius: 3px;
    }
    .hsc-card * code { background: oklch(0.93 0.002 250); }
    .hsc-dark code, .hsc-dark *  code {
      background: oklch(1 0 0 / 0.08);
      color: oklch(0.95 0.025 85);
    }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Canvas + shared shell -->
  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="components/Primitives.jsx"></script>
  <script type="text/babel" src="components/HscPhoto.jsx"></script>
  <script type="text/babel" src="components/Annotated.jsx"></script>
  <script type="text/babel" src="components/SystemPageShell.jsx"></script>
  <script type="text/babel" src="components/PhotoLibrary.jsx"></script>

  <!-- Email surface + extended block library + the 10 full templates -->
  <script type="text/babel" src="components/EmailBlocks.jsx"></script>
  <script type="text/babel" src="components/EmailBlocks2.jsx"></script>
  <script type="text/babel" src="components/EmailTemplates.jsx"></script>
  <script type="text/babel" src="components/EmailRebrand.jsx"></script>
  <script type="text/babel" src="components/EmailRebrandSpec.jsx"></script>

  <!-- Web blocks (legacy v2 hero/dark) + full pages + detailed typography -->
  <script type="text/babel" src="components/WebAndSocial.jsx"></script>
  <script type="text/babel" src="components/WebPages.jsx"></script>
  <script type="text/babel" src="components/WebPages2.jsx"></script>
  <script type="text/babel" src="components/WebTypography.jsx"></script>

  <!-- Social — existing 7 posts + 3 stories, plus 2 reels + feed preview -->
  <script type="text/babel" src="components/SocialBlocks.jsx"></script>
  <script type="text/babel" src="components/SocialFull.jsx"></script>
  <script type="text/babel" src="components/IGRebrandPosts.jsx"></script>
  <script type="text/babel" src="components/IGRebrandMedia.jsx"></script>
  <script type="text/babel" src="components/IGRebrandStories.jsx"></script>

  <!-- Spec sheets from v2 -->
  <script type="text/babel" src="components/SpecBlocks.jsx"></script>

  <script type="text/babel" data-presets="env,react">
    const { DesignCanvas, DCSection, DCArtboard } = window;

    function App() {
      return (
        <DesignCanvas
          title="Hair Solutions Co. — Master Design System"
          subtitle="One canvas. Brand foundations → Web typography → 4 full pages → 10 emails → 12 Instagram assets → Migration plan."
        >
          {/* ────────────────────────────────────────────────────────────
              01 · FOUNDATIONS
              ──────────────────────────────────────────────────────────── */}
          <DCSection id="foundations" title="01 · Foundations · tokens, palette, type, atoms">
            <DCArtboard id="tokens-refined" label="A · Refined (production)" width={1240} height={760}>
              <TokenSpec direction="refined" />
            </DCArtboard>
            <DCArtboard id="tokens-experimental" label="B · Experimental (alt)" width={1240} height={760}>
              <TokenSpec direction="experimental" />
            </DCArtboard>
          </DCSection>

          {/* ────────────────────────────────────────────────────────────
              02 · WEB TYPOGRAPHY — exact size & weight per section
              ──────────────────────────────────────────────────────────── */}
          <DCSection id="web-type" title="02 · Web Typography · exact size + weight per section">
            <DCArtboard id="web-type-card" label="Typography reference · every web style" width={1440} height={4180}>
              <WebTypographyGuide direction="refined" />
            </DCArtboard>
          </DCSection>

          {/* ────────────────────────────────────────────────────────────
              03 · WEB — full pages (Home, About, Collection, Product)
              Each page renders top-to-bottom with section labels on the
              page itself via Annotated (inline chip mode).
              ──────────────────────────────────────────────────────────── */}
          <DCSection id="web-home" title="03 · Web · Homepage (full, top → bottom)">
            <DCArtboard id="web-home-full" label="Homepage · v3 (brand-aligned)" width={1440} height={6800}>
              <HomePage direction="refined" />
            </DCArtboard>
          </DCSection>

          <DCSection id="web-about" title="04 · Web · About page (full)">
            <DCArtboard id="web-about-full" label="About · v3" width={1440} height={6800}>
              <AboutPage direction="refined" />
            </DCArtboard>
          </DCSection>

          <DCSection id="web-collection" title="05 · Web · Collection page (full)">
            <DCArtboard id="web-coll-full" label="Collection · v3" width={1440} height={5400}>
              <CollectionPage direction="refined" />
            </DCArtboard>
          </DCSection>

          <DCSection id="web-product" title="06 · Web · Product page (full)">
            <DCArtboard id="web-pdp-full" label="Product (PDP) · v3" width={1440} height={6600}>
              <ProductPage direction="refined" />
            </DCArtboard>
          </DCSection>

          {/* ────────────────────────────────────────────────────────────
              07 · EMAIL — ten full templates, top to bottom
              Each renders inside an EmailFrame at 640px; the artboard is
              900px wide so the right-side AnnotatedStack labels fit.
              ──────────────────────────────────────────────────────────── */}
          <DCSection id="emails" title="07 · Email · 10 full templates · top → bottom with section labels">
            {EMAIL_TEMPLATES.map(t => {
              const C = t.Component;
              return (
                <DCArtboard key={t.id} id={`email-${t.id}`} label={t.label} width={920} height={t.height}>
                  <C direction="refined" />
                </DCArtboard>
              );
            })}
          </DCSection>

          {/* ────────────────────────────────────────────────────────────
              07b · EMAIL — Rebrand launch · A/B/C variants
              Three opening strategies for the "We've rebranded" email.
              Each contains the five required sections: What's New,
              Founder, Products, 50% offer, Testimonials.
              ──────────────────────────────────────────────────────────── */}
          <DCSection id="emails-rebrand" title="07b · Email · 'We've rebranded' · A/B/C test variants">
            {REBRAND_EMAILS.map(t => {
              const C = t.Component;
              return (
                <DCArtboard key={t.id} id={`email-${t.id}`} label={t.label} width={920} height={t.height}>
                  <div>
                    <div style={{ padding: "16px 24px 12px", background: "var(--bg)", borderBottom: "1px solid var(--border)", fontFamily: "var(--f-sans)" }}>
                      <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: "0.16em", textTransform: "uppercase", color: "var(--ink-muted)" }}>{t.label}</div>
                      <div style={{ marginTop: 6, fontSize: 13, color: "var(--ink-soft)", lineHeight: 1.5 }}><b>Angle:</b> {t.angle}</div>
                      <div style={{ marginTop: 2, fontSize: 12, color: "var(--ink-muted)" }}><b>Subject:</b> {t.subject} &nbsp;·&nbsp; <b>Preheader:</b> {t.preheader}</div>
                    </div>
                    <C direction="refined" />
                  </div>
                </DCArtboard>
              );
            })}
          </DCSection>

          {/* GIF deliverable spec for variant C's marquee */}
          <DCSection id="emails-rebrand-spec" title="07c · Email · Rebrand marquee · GIF deliverable spec">
            <DCArtboard id="email-rebrand-gif-spec" label="Marquee GIF · production spec + client matrix" width={1240} height={1060}>
              <EmailRebrandSpec />
            </DCArtboard>
          </DCSection>

          <DCSection id="photo-library" title="07d · Brand · Photo library (with intended uses)">
            <DCArtboard id="photo-library" label="14 photographs · launch-ready" width={1440} height={2100}>
              <PhotoLibrary />
            </DCArtboard>
          </DCSection>

          {/* ────────────────────────────────────────────────────────────
              08 · INSTAGRAM — 7 posts · 2 reels · 3 stories · feed preview
              ──────────────────────────────────────────────────────────── */}
          <DCSection id="ig-feed" title="08 · Instagram · profile + 9-tile feed cadence">
            <DCArtboard id="ig-profile" label="@hairsolutionsco · profile + 9-tile" width={680} height={780}>
              <div className="hsc-surface dir-refined" style={{ padding: 32, background: "var(--bg)", display: "flex", justifyContent: "center" }}>
                <IGFeedPreview direction="refined" />
              </div>
            </DCArtboard>
          </DCSection>

          <DCSection id="ig-posts" title="09 · Instagram · 7 feed-post types (1080×1080)">
            <DCArtboard id="ig-posts-1" label="01–04 · Blog · Product · Collection · Hero" width={1640} height={460}>
              <div className="hsc-surface dir-refined" style={{ padding: 28, background: "var(--bg)", display: "flex", gap: 24, flexWrap: "wrap" }}>
                <IGBlogPost />
                <IGProductPost />
                <IGCollectionPost />
                <IGHeroPost />
              </div>
            </DCArtboard>
            <DCArtboard id="ig-posts-2" label="05–07 · Quote · Sale · Announcement" width={1240} height={460}>
              <div className="hsc-surface dir-refined" style={{ padding: 28, background: "var(--bg)", display: "flex", gap: 24, flexWrap: "wrap" }}>
                <IGQuotePost />
                <IGSalePost />
                <IGAnnouncementPost />
              </div>
            </DCArtboard>
          </DCSection>

          <DCSection id="ig-reels" title="10 · Instagram · Reels covers (1080×1920 cropped to 1080×1350 in feed)">
            <DCArtboard id="ig-reels" label="08–09 · Reel covers · how-to + before/after" width={680} height={460}>
              <div className="hsc-surface dir-refined" style={{ padding: 28, background: "var(--bg)", display: "flex", gap: 24 }}>
                <IGReelHowTo />
                <IGReelBeforeAfter />
              </div>
            </DCArtboard>
          </DCSection>

          <DCSection id="ig-stories" title="11 · Instagram · Stories (1080×1920)">
            <DCArtboard id="ig-stories" label="10–12 · Product · Quote · Sale stories" width={900} height={460}>
              <div className="hsc-surface dir-refined" style={{ padding: 28, background: "var(--bg)", display: "flex", gap: 24 }}>
                <IGStoryProduct />
                <IGStoryQuote />
                <IGStorySale />
              </div>
            </DCArtboard>
          </DCSection>

          {/* ────────────────────────────────────────────────────────────
              11b · INSTAGRAM — Launch campaign · 3 posts + story + reel
              First-row triptych (tease · reveal · invite) + a launch
              story sticker stack + a 42-second Reel storyboard.
              ──────────────────────────────────────────────────────────── */}
          <DCSection id="ig-launch-row" title="11b · Instagram · Launch · first row of the feed (3 posts)">
            <DCArtboard id="ig-launch-grid" label="Launch · 3-post triptych on profile" width={880} height={620}>
              <div className="hsc-surface dir-refined" style={{ padding: 32, background: "var(--bg)", display: "flex", justifyContent: "center" }}>
                <IGRebrandRowPreview />
              </div>
            </DCArtboard>
            <DCArtboard id="ig-launch-full" label="Launch · 3 posts at full 1080² preview" width={1240} height={460}>
              <div className="hsc-surface dir-refined" style={{ padding: 28, background: "var(--bg)", display: "flex", gap: 24 }}>
                <IGLaunch1_Tease />
                <IGLaunch2_Reveal />
                <IGLaunch3_Invite />
              </div>
            </DCArtboard>
          </DCSection>

          <DCSection id="ig-launch-story" title="11c · Instagram · Launch · Stories sequence (5 frames)">
            <DCArtboard id="ig-launch-story-sequence" label="Launch day · 5-story sequence" width={1520} height={680}>
              <IGRebrandStorySequence />
            </DCArtboard>
            <DCArtboard id="ig-launch-story-single" label="Original launch story · standalone" width={380} height={560}>
              <div className="hsc-surface dir-refined" style={{ padding: 28, background: "var(--bg)", display: "flex", justifyContent: "center" }}>
                <IGRebrandStory />
              </div>
            </DCArtboard>
          </DCSection>

          <DCSection id="ig-launch-reel" title="11d · Instagram · Launch · Reel concept + storyboard">
            <DCArtboard id="ig-launch-reel" label="Reel · 'Same hands. New look.' · cover + 42s scene plan" width={1240} height={760}>
              <div className="hsc-surface dir-refined" style={{ padding: 28, background: "var(--bg)" }}>
                <IGRebrandReel />
              </div>
            </DCArtboard>
          </DCSection>

          {/* ────────────────────────────────────────────────────────────
              12 · DOCUMENTATION — spec sheets + migration plan
              ──────────────────────────────────────────────────────────── */}
          <DCSection id="email-spec" title="12 · Email design — written spec">
            <DCArtboard id="email-spec" label="Email rules" width={1240} height={820}>
              <EmailDesignSpec />
            </DCArtboard>
          </DCSection>

          <DCSection id="migration" title="13 · Migration plan — blocks, sections, templates">
            <DCArtboard id="migration-plan" label="Migration phases" width={1240} height={1080}>
              <MigrationPlan />
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
