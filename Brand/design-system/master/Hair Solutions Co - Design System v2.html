<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Hair Solutions Co. — Design System v2</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="styles/tokens.css" />
  <style>
    html, body { margin: 0; padding: 0; background: #1a1a18; }
    body { font-family: 'Geist', system-ui, sans-serif; }
    /* Make sure code looks clean inside spec sheets */
    code { font-family: 'Geist Mono', ui-monospace, monospace; font-size: 0.92em; background: oklch(0.92 0.01 80); padding: 1px 6px; border-radius: 4px; }
    .hsc-card * code { background: oklch(0.92 0.01 80); }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="components/Primitives.jsx"></script>
  <script type="text/babel" src="components/EmailBlocks.jsx"></script>
  <script type="text/babel" src="components/WebAndSocial.jsx"></script>
  <script type="text/babel" src="components/SpecBlocks.jsx"></script>
  <script type="text/babel" data-presets="env,react">
    const { DesignCanvas, DCSection, DCArtboard } = window;

    function App() {
      const directions = [
        { id: "refined",      label: "A · Refined" },
        { id: "experimental", label: "B · Experimental" },
      ];

      return (
        <DesignCanvas
          title="Hair Solutions Co. — Design System v2"
          subtitle="Two directions across email, web, Instagram. Pick the one we commit to."
        >
          {/* ─── Tokens ──────────────────────────── */}
          <DCSection id="tokens" title="01 · Tokens & atoms">
            {directions.map(d => (
              <DCArtboard key={d.id} id={`tokens-${d.id}`} label={d.label} width={1240} height={760}>
                <TokenSpec direction={d.id} />
              </DCArtboard>
            ))}
          </DCSection>

          {/* ─── Email full template ─────────────── */}
          <DCSection id="email-full" title="02 · Email — full template (recap / loyalty)">
            {directions.map(d => (
              <DCArtboard key={d.id} id={`email-full-${d.id}`} label={d.label} width={720} height={2680}>
                <EmailFrame direction={d.id}>
                  <EmailHeader />
                  <EmailHero
                    direction={d.id}
                    eyebrow="Recap · 2026"
                    title={d.id === "experimental" ? "Three years in." : "Three years, well-worn."}
                    body="You've ordered three systems with us, the last one a French Lace at 115% density. Here's what we've learned about your fit — and what we'd recommend next."
                    ctaLabel="Open my recap"
                  />
                  <EmailIntroCopy>
                    Hi Marcus, this is the short version of your file with us. The data isn't shared anywhere — it's just so the next system fits even better than the last.
                  </EmailIntroCopy>
                  <EmailSnapshot />
                  <EmailRecommendation direction={d.id} />
                  <EmailDarkBreaker direction={d.id} />
                  <EmailTestimonial direction={d.id} />
                  <EmailSplitMedia direction={d.id} />
                  <EmailFooter />
                </EmailFrame>
              </DCArtboard>
            ))}
          </DCSection>

          {/* ─── Email — transactional ──────────── */}
          <DCSection id="email-tx" title="03 · Email — transactional (order confirmation)">
            {directions.map(d => (
              <DCArtboard key={d.id} id={`email-tx-${d.id}`} label={d.label} width={720} height={1860}>
                <EmailFrame direction={d.id}>
                  <EmailHeader />
                  <EmailHero
                    direction={d.id}
                    eyebrow="Order confirmed"
                    title={d.id === "experimental" ? "Cutting begins." : "We've started cutting."}
                    body="Your order is in the queue. We'll email you a tracking link the day it ships, usually within 10 business days."
                    ctaLabel="Track my order"
                    subject="product"
                  />
                  <EmailOrderSummary />
                  <EmailIntroCopy>
                    A note before it ships — your first wear is the most important. We'll send a fitting guide 48 hours before delivery. Reply to this email if anything in the order looks off.
                  </EmailIntroCopy>
                  <EmailFooter />
                </EmailFrame>
              </DCArtboard>
            ))}
          </DCSection>

          {/* ─── Email — promotional ─────────────── */}
          <DCSection id="email-promo" title="04 · Email — promotional (collection drop)">
            {directions.map(d => (
              <DCArtboard key={d.id} id={`email-promo-${d.id}`} label={d.label} width={720} height={1980}>
                <EmailFrame direction={d.id}>
                  <EmailHeader tone="dark" />
                  <EmailHero
                    direction={d.id}
                    eyebrow="New · Spring 26"
                    title={d.id === "experimental" ? "Lace, refined." : "Lace, refined."}
                    body="A new run of French Lace bases — finer knotting at the hairline, two new graphite ratios, same 14-day turnaround."
                    ctaLabel="Shop the drop"
                    subject="portrait"
                  />
                  <EmailProductGrid />
                  <EmailTestimonial direction={d.id} />
                  <EmailFooter />
                </EmailFrame>
              </DCArtboard>
            ))}
          </DCSection>

          {/* ─── Web ─────────────────────────────── */}
          <DCSection id="web" title="05 · Web — homepage above-the-fold + dark breaker">
            {directions.map(d => (
              <DCArtboard key={d.id} id={`web-${d.id}`} label={d.label} width={1280} height={1640}>
                <WebFrame direction={d.id}>
                  <WebNav />
                  <WebHero direction={d.id} />
                  {d.id === "experimental" && <WebExperimentalHeroMedia />}
                  <WebProductRow />
                  <WebDarkSection direction={d.id} />
                </WebFrame>
              </DCArtboard>
            ))}
          </DCSection>

          {/* ─── Instagram ───────────────────────── */}
          <DCSection id="ig" title="06 · Instagram — posts + stories">
            {directions.map(d => (
              <DCArtboard key={d.id} id={`ig-${d.id}`} label={d.label} width={1240} height={460}>
                <div className={`hsc-surface dir-${d.id}`} style={{ padding: 24, background: "var(--bg)", display: "flex", gap: 20, alignItems: "flex-start", flexWrap: "wrap" }}>
                  <IGPost direction={d.id} kind="promo" />
                  <IGPost direction={d.id} kind="dark" />
                  <IGPost direction={d.id} kind="product" />
                  <IGStory direction={d.id} kind="product" />
                  <IGStory direction={d.id} kind="dark" />
                </div>
              </DCArtboard>
            ))}
          </DCSection>

          {/* ─── Spec sheets ─────────────────────── */}
          <DCSection id="spec" title="07 · Email Design — written spec">
            <DCArtboard id="email-spec" label="Email rules" width={1240} height={820}>
              <EmailDesignSpec />
            </DCArtboard>
          </DCSection>

          <DCSection id="migration" title="08 · Migration plan — blocks, sections, templates">
            <DCArtboard id="migration-plan" label="Migration phases" width={1240} height={1080}>
              <MigrationPlan />
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
