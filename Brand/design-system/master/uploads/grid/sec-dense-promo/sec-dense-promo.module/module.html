<table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:{{ module.bg.color }};border-collapse:collapse;">
  <tr>
    <td class="stack-column" width="50%" valign="top" style="padding:20px 14px 20px 32px;border-right:1px solid #d8d8d8;">
      <img src="{{ module.a_image.src }}" alt="{{ module.a_image.alt }}" width="250" style="display:block;width:100%;max-width:250px;height:auto;border:0;" />
      <div style="margin-top:12px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,Helvetica,sans-serif;font-size:15px;line-height:1.65;color:#1a1a1a;">{{ module.a_body }}</div>
      <a href="{{ module.a_url.href }}" style="display:inline-block;margin-top:12px;background-color:#1a1a1a;color:#fff;text-decoration:none;border-radius:12px;padding:10px 18px;font-size:12px;font-weight:700;">{{ module.a_cta }}</a>
    </td>
    <td class="stack-column" width="50%" valign="top" style="padding:20px 32px 20px 14px;">
      <img src="{{ module.b_image.src }}" alt="{{ module.b_image.alt }}" width="250" style="display:block;width:100%;max-width:250px;height:auto;border:0;" />
      <div style="margin-top:12px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,Helvetica,sans-serif;font-size:15px;line-height:1.65;color:#1a1a1a;">{{ module.b_body }}</div>
      <a href="{{ module.b_url.href }}" style="display:inline-block;margin-top:12px;background-color:#1a1a1a;color:#fff;text-decoration:none;border-radius:12px;padding:10px 18px;font-size:12px;font-weight:700;">{{ module.b_cta }}</a>
    </td>
  </tr>
</table>
