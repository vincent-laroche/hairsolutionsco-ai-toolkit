<table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:{{ module.bg_color.color }};border-collapse:collapse;">
  <tr><td align="center" style="padding:0;">
    <a href="{{ module.image_link.href }}" target="_blank" rel="noopener noreferrer" style="display:block;text-decoration:none;border:0;">
      <img class="fluid" src="{{ module.hero_image.src }}" alt="{{ module.hero_image.alt }}" width="600" style="display:block;width:100%;max-width:600px;height:auto;border:0;outline:none;" />
    </a>
  </td></tr>
</table>
