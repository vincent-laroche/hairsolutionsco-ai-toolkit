<table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:{{ module.bg.color }};border-collapse:collapse;border-top:1px solid #d8d8d8;">
  {% if module.show_image %}<tr><td align="center" style="padding:20px 32px 8px 32px;"><img src="{{ module.image.src }}" alt="{{ module.image.alt }}" width="200" style="display:block;max-width:200px;height:auto;border:0;margin:0 auto;" /></td></tr>{% endif %}
  <tr><td align="center" style="padding:12px 32px 8px 32px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,Helvetica,sans-serif;font-size:12px;color:#666666;">
    <a href="{{ module.ig.href }}" style="color:#666666;">Instagram</a> <span style="color:#d8d8d8;">|</span> <a href="{{ module.fb.href }}" style="color:#666666;">Facebook</a> <span style="color:#d8d8d8;">|</span> <a href="{{ module.site.href }}" style="color:#666666;">Web</a>
  </td></tr>
  <tr><td style="padding:0 32px 20px 32px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,Helvetica,sans-serif;font-size:11px;color:#888888;">{{ module.note }}<p style="margin:8px 0 0 0;">In the drag-and-drop editor, add HubSpot&rsquo;s default <strong>Email footer</strong> after this for address, preferences, and legal links. This coded row keeps social only.</p></td></tr>
</table>
