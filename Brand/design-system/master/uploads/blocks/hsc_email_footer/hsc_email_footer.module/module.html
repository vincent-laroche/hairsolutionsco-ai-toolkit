<!--
  templateType: "none"
  isAvailableForNewContent: false
-->
<table width="100%" cellpadding="0" cellspacing="0" border="0"
  style="background-color:{{ module.footer_bg_color.color }}; margin-top:8px;">
  <tr>
    <td style="padding:26px 4px 0; text-align:center; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,Helvetica,sans-serif; font-size:11px; color:#666666; line-height:1.6;">
      <p style="margin:0 0 10px 0; font-weight:700; color:#666666; font-size:13px;">{{ module.company_name }}</p>
      <p style="margin:0 0 8px 0;">{{ module.company_address }}</p>
      {% if module.show_social_links %}
      <p style="margin:0 0 8px 0;">
        {% if module.instagram_url.href %}<a href="{{ module.instagram_url.href }}" style="color:#666666; text-decoration:underline; margin:0 10px;">Instagram</a>{% endif %}
        {% if module.facebook_url.href %}<a href="{{ module.facebook_url.href }}" style="color:#666666; text-decoration:underline; margin:0 10px;">Facebook</a>{% endif %}
      </p>
      {% endif %}
      <p style="margin:0;">
        <a href="{{ unsubscribe_link }}" style="color:#666666; text-decoration:underline;">Unsubscribe</a>
        &nbsp;·&nbsp;
        <a href="{{ module.privacy_url.href | default('https://hairsolutions.co/policies/privacy-policy') }}" style="color:#666666; text-decoration:underline;">Privacy</a>
      </p>
    </td>
  </tr>
</table>
