<!--
  templateType: "none"
  isAvailableForNewContent: false
  Centered logo; optional nav on a second row (centered). Body/canvas sand #f0f0f0
  in email template; header bar background from field (default #fff).
-->
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0"
  style="background-color:{{ module.header_bg_color.color }}; border-collapse:collapse; margin:0; padding:0;">
  <tr>
    <td
      style="padding:34px 28px 24px 28px; border-bottom:1px solid #d8d8d8; vertical-align:top;">

      <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0"
        style="border-collapse:collapse;">
        <tr>
          <td align="center" style="text-align:center; vertical-align:top; padding:0 0 0 0;">
            <a href="{{ module.logo_url.href }}"
              target="_blank"
              rel="noopener noreferrer"
              style="text-decoration:none; display:inline-block; border:0;">
              <img
                src="{{ module.logo_image.src }}"
                alt="{{ module.logo_image.alt }}"
                width="180"
                style="display:block; border:0; outline:none; text-decoration:none; width:180px; max-width:100%; height:auto; margin:0 auto; font-family:Arial,Helvetica,sans-serif; font-size:13px; line-height:1.2; color:#1a1a1a;" />
            </a>
          </td>
        </tr>
        {% if module.show_nav %}
        <tr>
          <td align="center" style="text-align:center; padding:18px 0 0 0; vertical-align:top;">
            {% if module.nav_url_1.href %}
              <a href="{{ module.nav_url_1.href }}"
                target="_blank" rel="noopener noreferrer"
                style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,Helvetica,sans-serif; font-size:9px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; color:#111111; text-decoration:none; display:inline-block;">{{ module.nav_label_1 }}</a>
            {% endif %}
            {% if module.nav_url_2.href %}
              <a href="{{ module.nav_url_2.href }}"
                target="_blank" rel="noopener noreferrer"
                style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,Helvetica,sans-serif; font-size:9px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; color:#111111; text-decoration:none; display:inline-block; margin-left:14px;">{{ module.nav_label_2 }}</a>
            {% endif %}
            {% if module.nav_url_3.href %}
              <a href="{{ module.nav_url_3.href }}"
                target="_blank" rel="noopener noreferrer"
                style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,Helvetica,sans-serif; font-size:9px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; color:#111111; text-decoration:none; display:inline-block; margin-left:14px;">{{ module.nav_label_3 }}</a>
            {% endif %}
          </td>
        </tr>
        {% endif %}
      </table>

    </td>
  </tr>
</table>
