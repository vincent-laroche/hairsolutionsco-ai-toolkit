<!--
  templateType: "none"
  isAvailableForNewContent: false
-->
<table width="100%" cellpadding="0" cellspacing="0" border="0"
  style="background-color:#ffffff; border-radius:14px; margin-bottom:24px;">
  <tr>
    <td style="padding:32px 44px; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,Helvetica,sans-serif; font-size:15px; color:#1a1a1a; line-height:1.6;">
      {% set base = contact.hsc_last_system_base_type | default("") | lower %}
      {% if "skin" in base or "poly" in base %}
        {{ module.poly_lifespan_message }}
      {% elif "lace" in base %}
        {{ module.lace_lifespan_message }}
      {% else %}
        {{ module.mono_lifespan_message }}
      {% endif %}
      <p style="margin:22px 0 0;">
        <a href="{{ module.cta_url.href }}"
          style="display:inline-block; background-color:#000000; color:#ffffff; border-radius:12px; padding:14px 24px; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,Helvetica,sans-serif; font-size:13px; font-weight:700; text-decoration:none; min-height:44px; line-height:1.5; box-sizing:border-box;">{{ module.cta_button_text }}</a>
      </p>
    </td>
  </tr>
</table>
