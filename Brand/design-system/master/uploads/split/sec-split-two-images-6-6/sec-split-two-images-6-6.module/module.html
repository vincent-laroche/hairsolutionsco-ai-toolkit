<table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:{{ module.bg.color }};border-collapse:collapse;">
  <tr>
    <td class="stack-column" width="50%" align="center" style="padding:20px 12px 20px 32px;">
      <a href="{{ module.left_url.href }}" style="text-decoration:none;border:0;"><img src="{{ module.left_image.src }}" alt="{{ module.left_image.alt }}" width="260" style="display:block;width:100%;max-width:260px;height:auto;border:0;" /></a>
    </td>
    <td class="stack-column" width="50%" align="center" style="padding:20px 32px 20px 12px;">
      <a href="{{ module.right_url.href }}" style="text-decoration:none;border:0;"><img src="{{ module.right_image.src }}" alt="{{ module.right_image.alt }}" width="260" style="display:block;width:100%;max-width:260px;height:auto;border:0;" /></a>
    </td>
  </tr>
</table>
