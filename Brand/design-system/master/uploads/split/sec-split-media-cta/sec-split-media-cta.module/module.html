<table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:{{ module.bg.color }};border-collapse:collapse;">
  <tr>
  {% if module.layout_ratio == "3_9" %}
    <td class="stack-column" width="25%" valign="top" style="padding:24px 12px 24px 32px;">
      <img src="{{ module.left_image.src }}" alt="{{ module.left_image.alt }}" width="180" style="display:block;width:100%;max-width:180px;height:auto;border:0;" />
    </td>
    <td class="stack-column" width="75%" valign="top" style="padding:24px 32px 24px 12px;">
      <div style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,Helvetica,sans-serif;font-size:15px;line-height:1.65;color:#1a1a1a;">{{ module.right_body }}</div>
      <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="margin-top:16px;"><tr><td>
        <a href="{{ module.cta_url.href }}" style="display:inline-block;background-color:#1a1a1a;color:#ffffff;text-decoration:none;border-radius:12px;padding:12px 22px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,Helvetica,sans-serif;font-size:13px;font-weight:700;">{{ module.cta_text }}</a>
      </td></tr></table>
    </td>
  {% else %}
    <td class="stack-column" width="33%" valign="top" style="padding:24px 12px 24px 32px;">
      <img src="{{ module.left_image.src }}" alt="{{ module.left_image.alt }}" width="180" style="display:block;width:100%;max-width:180px;height:auto;border:0;" />
    </td>
    <td class="stack-column" width="67%" valign="top" style="padding:24px 32px 24px 12px;">
      <div style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,Helvetica,sans-serif;font-size:15px;line-height:1.65;color:#1a1a1a;">{{ module.right_body }}</div>
      <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="margin-top:16px;"><tr><td>
        <a href="{{ module.cta_url.href }}" style="display:inline-block;background-color:#1a1a1a;color:#ffffff;text-decoration:none;border-radius:12px;padding:12px 22px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,Helvetica,sans-serif;font-size:13px;font-weight:700;">{{ module.cta_text }}</a>
      </td></tr></table>
    </td>
  {% endif %}
  </tr>
</table>
