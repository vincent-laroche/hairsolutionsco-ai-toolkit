<table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:{{ module.bg.color }};border-collapse:collapse;">
  {% if module.layout_mode == "side_by_side" %}
  <tr>
    <td class="stack-column" width="45%" valign="top" style="padding:24px 12px 24px 32px;"><img src="{{ module.image.src }}" alt="{{ module.image.alt }}" width="240" style="display:block;width:100%;max-width:240px;height:auto;border:0;" /></td>
    <td class="stack-column" width="55%" valign="top" style="padding:24px 32px 24px 12px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,Helvetica,sans-serif;font-size:15px;line-height:1.65;color:#1a1a1a;">
      <div>{{ module.rich_text }}</div>
      <a href="{{ module.cta_url.href }}" style="display:inline-block;margin-top:14px;background-color:#1a1a1a;color:#fff;text-decoration:none;border-radius:12px;padding:12px 20px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,Helvetica,sans-serif;font-size:13px;font-weight:700;">{{ module.cta_text }}</a>
    </td>
  </tr>
  {% else %}
  <tr><td style="padding:24px 40px 8px 40px;text-align:center;"><img src="{{ module.image.src }}" alt="{{ module.image.alt }}" width="400" style="display:block;width:100%;max-width:400px;height:auto;margin:0 auto;border:0;" /></td></tr>
  <tr><td style="padding:8px 40px 12px 40px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,Helvetica,sans-serif;font-size:15px;line-height:1.65;color:#1a1a1a;"><div>{{ module.rich_text }}</div></td></tr>
  <tr><td style="padding:0 40px 24px 40px;" align="left"><a href="{{ module.cta_url.href }}" style="display:inline-block;background-color:#1a1a1a;color:#fff;text-decoration:none;border-radius:12px;padding:12px 20px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,Helvetica,sans-serif;font-size:13px;font-weight:700;">{{ module.cta_text }}</a></td></tr>
  {% endif %}
</table>
