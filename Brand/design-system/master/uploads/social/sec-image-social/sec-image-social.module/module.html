<table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:{{ module.bg.color }};border-collapse:collapse;">
  {% if module.layout == "stacked" %}
  <tr><td align="center" style="padding:20px 32px 8px 32px;"><img src="{{ module.image.src }}" alt="{{ module.image.alt }}" width="320" style="display:block;max-width:100%;height:auto;border:0;" /></td></tr>
  <tr><td align="center" style="padding:8px 32px 20px 32px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,Helvetica,sans-serif;font-size:12px;color:#666666;">
    <a href="{{ module.ig.href }}" style="color:#666666;margin:0 6px;">Instagram</a> | <a href="{{ module.fb.href }}" style="color:#666666;margin:0 6px;">Facebook</a> | <a href="{{ module.site.href }}" style="color:#666666;margin:0 6px;">Web</a>
  </td></tr>
  {% else %}
  <tr>
    <td class="stack-column" width="50%" align="center" style="padding:20px 16px 20px 32px;"><img src="{{ module.image.src }}" alt="{{ module.image.alt }}" width="260" style="display:block;width:100%;max-width:260px;height:auto;border:0;" /></td>
    <td class="stack-column" width="50%" align="center" valign="middle" style="padding:20px 32px 20px 16px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,Helvetica,sans-serif;font-size:12px;color:#666666;">
      <a href="{{ module.ig.href }}" style="color:#666666;display:block;margin:6px 0;">Instagram</a>
      <a href="{{ module.fb.href }}" style="color:#666666;display:block;margin:6px 0;">Facebook</a>
      <a href="{{ module.site.href }}" style="color:#666666;display:block;margin:6px 0;">hairsolutions.co</a>
    </td>
  </tr>
  {% endif %}
</table>
